<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"><title>托福写作练习室</title>
    <script src="https://lf-cdn.coze.cn/obj/unpkg/flow-platform/chat-app-sdk/1.2.0-beta.19/libs/cn/index.js"></script>
    <style>
        :root { --p: #4a90e2; --s: #2ecc71; }
        body { font-family: sans-serif; background: #f5f7fa; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 900px; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .timer-box { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
        #timerDisplay { font-size: 2rem; font-weight: bold; color: var(--p); }
        textarea { width: 100%; padding: 15px; border: 1px solid #ccc; border-radius: 8px; font-size: 18px; box-sizing: border-box; }
        #answerInput { height: 350px; font-family: 'Times New Roman', serif; margin-top: 10px; }
        .btn-submit { background: var(--s); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <div class="timer-box">
        <div>时间: <input type="number" id="timeInput" value="10" style="width:40px"> 分 
        <button onclick="startTimer()" id="sBtn" style="background:var(--p);color:white;border:none;padding:5px 10px;border-radius:4px;">开始计时</button></div>
        <div id="timerDisplay">10:00</div>
    </div>
    <textarea id="answerInput" placeholder="在此写作文...写完点绿色按钮，会自动下载并复制作文。"></textarea>
    <button class="btn-submit" onclick="doExport()">📥 导出并下载作文 (自动复制作文内容)</button>
</div>

<script>
  // 1. AI 嵌入 - 请替换成你刚才在“安装”里看到的真实 token
  new CozeWebSDK.WebChatClient({
    config: { bot_id: '7616762350431256595' },
    componentProps: { title: '托福批改专家' },
    auth: { 
      type: 'token', 
      token: '这里填入你刚才复制的那个pat_开头的长字符串', 
      onRefreshToken: function () { return '这里再填一次那个pat_开头的长字符串' } 
    }
  });

  // 2. 导出下载逻辑 (核心修复)
  function doExport() {
      const txt = document.getElementById('answerInput').value;
      if(!txt) return alert("内容为空！");
      
      // 自动复制
      navigator.clipboard.writeText(txt).then(() => {
          alert("✅ 已复制作文！\n\n文档已开始下载。下载完点右下角机器人直接粘贴。");
      });

      // 真正执行下载
      const blob = new Blob(['\ufeff', '<html><meta charset="utf-8"><body>' + txt.replace(/\n/g, '<br>') + '</body></html>'], { type: 'application/msword' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = "TOEFL_Practice.doc";
      a.click();
  }

  // 计时器
  let t, sec = 600;
  function startTimer() {
      sec = document.getElementById('timeInput').value * 60;
      t = setInterval(() => { 
          sec--; 
          document.getElementById('timerDisplay').innerText = Math.floor(sec/60) + ":" + String(sec%60).padStart(2,'0');
          if(sec <= 0) clearInterval(t);
      }, 1000);
      document.getElementById('sBtn').disabled = true;
  }
</script>
</body>
</html>

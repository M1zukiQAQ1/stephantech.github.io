<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小智写作练习室 - 批改增强版</title>
<style>
    /* 完整保留你的原始精美 CSS */
    :root {
        --primary-color: #4a90e2;
        --bg-color: #f5f7fa;
        --card-bg: #ffffff;
        --text-color: #333;
        --danger-color: #e74c3c;
        --overtime-color: #c0392b;
        --success-color: #2ecc71;
    }

    body {
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
    }

    .container {
        width: 100%;
        max-width: 1000px; 
        background: var(--card-bg);
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        padding-bottom: 15px;
        border-bottom: 2px solid #eee;
    }

    .timer-controls {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    input[type="number"] {
        width: 60px;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 16px;
    }

    button {
        padding: 8px 16px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        transition: background 0.2s;
        color: white;
    }

    .btn-start { background-color: var(--primary-color); }
    .btn-reset { background-color: var(--danger-color); }

    .btn-submit {
        background-color: var(--success-color);
        font-size: 16px;
        padding: 10px 24px;
        margin-top: 15px;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    /* 新增：去批改按钮样式 */
    .btn-ai {
        background-color: #6a67ce;
        font-size: 16px;
        padding: 10px 24px;
        margin-top: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        text-decoration: none;
        color: white;
        border-radius: 6px;
        font-weight: bold;
    }

    .timer-display {
        font-size: 2.5rem;
        font-weight: bold;
        color: var(--primary-color);
        min-width: 180px;
        text-align: right;
    }

    .section-title {
        font-size: 1.1rem;
        font-weight: bold;
        margin: 20px 0 10px;
        color: #555;
    }

    .question-area {
        margin-bottom: 25px;
        border: 2px dashed #ddd;
        padding: 15px;
        border-radius: 8px;
        background: #fafafa;
    }

    .question-input {
        width: 100%;
        border: none;
        background: transparent;
        font-size: 16px;
        outline: none;
        resize: vertical;
    }

    textarea.answer-input {
        width: 100%;
        height: 300px;
        padding: 15px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 18px;
        line-height: 1.6;
        font-family: 'Times New Roman', serif;
        box-sizing: border-box;
    }

    .footer-controls {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        margin-top: 10px;
    }

    .word-count { font-size: 0.9rem; color: #666; margin-bottom: 10px; }

    @keyframes pulse {
        0% { opacity: 1; }
        50% { opacity: 0.6; }
        100% { opacity: 1; }
    }
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="timer-controls">
            <label>设置时间(分钟):</label>
            <input type="number" id="timeInput" value="10">
            <button class="btn-start" onclick="toggleTimer()" id="startBtn">开始计时</button>
            <button class="btn-reset" onclick="resetTimer()">重置</button>
        </div>
        <div class="timer-display" id="timerDisplay">10:00</div>
    </div>

    <div class="section-title">题目栏</div>
    <div class="question-area">
        <textarea class="question-input" id="qTextInput" rows="2" placeholder="粘贴题目文本..."></textarea>
    </div>

    <div class="section-title">作答区</div>
    <div class="answer-area">
        <textarea class="answer-input" id="answerInput" placeholder="开始写作..." oninput="updateWordCount()"></textarea>
        
        <div class="footer-controls">
            <div class="word-count">当前字数: <span id="wordCount">0</span></div>
            <button class="btn-submit" onclick="exportAndCopy()">
                📥 提交并下载文档 (自动复制)
            </button>
            <a href="https://doubao.com/bot/vy4SxUh5" target="_blank" class="btn-ai">
                🤖 去豆包 AI 自动批改
            </a>
        </div>
    </div>
</div>

<script>
    let timer, total = 600, isRunning = false;

    function formatTime(s) {
        return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
    }

    function toggleTimer() {
        const btn = document.getElementById('startBtn');
        if(isRunning) {
            clearInterval(timer); isRunning = false; btn.textContent = "继续";
        } else {
            if(btn.textContent === "开始计时") total = document.getElementById('timeInput').value * 60;
            isRunning = true; btn.textContent = "暂停";
            timer = setInterval(() => {
                total--; document.getElementById('timerDisplay').textContent = formatTime(total);
                if(total <= 0) clearInterval(timer);
            }, 1000);
        }
    }

    function resetTimer() {
        clearInterval(timer); isRunning = false;
        document.getElementById('startBtn').textContent = "开始计时";
        total = document.getElementById('timeInput').value * 60;
        document.getElementById('timerDisplay').textContent = formatTime(total);
    }

    function updateWordCount() {
        const txt = document.getElementById('answerInput').value.trim();
        document.getElementById('wordCount').textContent = txt === '' ? 0 : txt.split(/\s+/).length;
    }

    // 核心修复逻辑
    function exportAndCopy() {
        const txt = document.getElementById('answerInput').value;
        if(!txt) { alert("还没写内容哦！"); return; }

        // 1. 自动复制到剪贴板
        navigator.clipboard.writeText(txt).then(() => {
            alert("✅ 内容已自动复制到剪贴板！\n\n文档已下载，请点击下方紫色按钮去豆包直接粘贴批改。");
        });

        // 2. 导出 Word
        const html = `<html><meta charset="utf-8"><body><h2 style="text-align:center">Writing Practice</h2><p>${txt.replace(/\n/g, '<br>')}</p></body></html>`;
        const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = "TOEFL_Practice.doc";
        link.click();
    }
</script>
</body>
</html>
